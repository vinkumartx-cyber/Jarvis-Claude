  max_positions: 3
  rr_floor: 1.5
  correlation_cap: 0.7

probability:
  edge_threshold: 0.05
  min_sample_size: 30

strategies:
  momentum:
    enabled: true
  mean_reversion:
    enabled: true
  breakout:
    enabled: true

markets:
