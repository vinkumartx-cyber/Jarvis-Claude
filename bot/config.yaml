      - ETH/USDT
      - SOL/USDT
    timeframes:
      - 5m
      - 15m
  polymarket:
    markets: []
    poll_seconds: 60

execution:
  paper:
    slippage_bps_crypto: 5
    slippage_cents_poly: 0.01
    maker_bps: 2
    taker_bps: 7
